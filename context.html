<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanessa Li Context</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid #222;
    }

    .header .back {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.8rem;
      font-weight: 400;
      background: none;
      border: none;
      cursor: pointer;
      color: #999;
      padding: 0;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .header .back:hover {
      color: #fff;
    }

    .header .copy-btn {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.8rem;
      font-weight: 700;
      background: #22c55e;
      color: #fff;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 0;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .header .copy-btn:hover {
      background: #16a34a;
    }

    .header .copy-btn.copied {
      background: #333;
      color: #fff;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
    }

    .content pre {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.85rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-wrap: break-word;
      color: #f0f0f0;
    }

    .content pre::after {
      content: '█';
      animation: blink 1s step-end infinite;
      color: #22c55e;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @media (max-width: 600px) {
      .header {
        padding: 1rem;
      }
      .content {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <a class="back" href="index.html">← Back</a>
    <button class="copy-btn" id="copyBtn">Let Your AI Research Me</button>
  </div>
  <div class="content">
    <pre id="markdownContent"></pre>
  </div>

  <script>
    const copyBtn = document.getElementById('copyBtn');
    const markdownContent = document.getElementById('markdownContent');
    const btnLabel = 'Let Your AI Research Me';

    let mdText = '';
    let promptText = '';

    Promise.all([
      fetch('content.md').then(r => r.text()),
      fetch('prompt.md').then(r => r.text())
    ]).then(([content, prompt]) => {
      mdText = content;
      promptText = prompt.replace('{{CONTEXT}}', content);
      markdownContent.textContent = content;
    });

    async function copyToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
    }

    copyBtn.addEventListener('click', async () => {
      await copyToClipboard(promptText);
      copyBtn.textContent = 'Copied!';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = btnLabel;
        copyBtn.classList.remove('copied');
      }, 2000);
    });
  </script>

</body>
</html>
