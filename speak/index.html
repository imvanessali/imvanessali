<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>口语练习 Prompt 生成器</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --ink: #1a1610;
    --ink2: #5a5040;
    --ink3: #9a8e78;
    --gold: #b8860b;
    --gold-light: #d4a017;
    --line: rgba(26,22,16,0.12);
    --card-bg: rgba(255,255,255,0.6);
    --card-active: rgba(184,134,11,0.08);
    --card-border: rgba(26,22,16,0.1);
    --card-active-border: rgba(184,134,11,0.5);
    --green: #3a7a3a;
    --green-bg: rgba(58,122,58,0.07);
    --green-border: rgba(58,122,58,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
  }

  body::before { display: none; }

  body::after {
    content: '';
    position: fixed; top: 0; left: 88px;
    width: 1px; height: 100%;
    background: rgba(139,32,32,0.2); z-index: 0;
  }

  .page {
    position: relative; z-index: 1;
    max-width: 860px; margin: 0 auto;
    padding: 56px 48px 100px 112px;
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 27px,
      rgba(26,22,16,0.04) 27px, rgba(26,22,16,0.04) 28px
    );
  }

  /* ── Header ── */
  .header { margin-bottom: 48px; animation: fadeUp 0.5s ease both; }
  .header-eyebrow {
    font-size: 10px; font-weight: 300;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 10px;
  }
  .header-title {
    font-family: 'Libre Baskerville', serif;
    font-size: 34px; font-weight: 700; line-height: 1.15; margin-bottom: 8px;
  }
  .header-title em { font-style: italic; color: var(--gold); }
  .header-sub { font-size: 11px; color: var(--ink3); letter-spacing: 0.05em; }

  .section { margin-bottom: 36px; overflow: visible; }

  .section-label {
    font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--ink3); margin-bottom: 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--line); }


  /* ── Two-column layout ── */
  .picker-row {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 16px;
    align-items: start;
  }

  /* ── Scene dropdown ── */
  .scene-dropdown-wrap { position: relative; z-index: 1000; overflow: visible; }

  .scene-trigger {
    width: 100%;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 13px 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    transition: all 0.15s;
    backdrop-filter: blur(4px);
    user-select: none;
  }
  .scene-trigger:hover { border-color: rgba(184,134,11,0.4); background: rgba(255,255,255,0.8); }
  .scene-trigger.open {
    border-color: var(--card-active-border);
    border-bottom-left-radius: 0;
    border-bottom-right-radius: 0;
    background: rgba(255,255,255,0.9);
  }

  .st-content { display: flex; align-items: center; gap: 10px; }
  .st-icon { font-size: 16px; }
  .st-texts { display: flex; flex-direction: column; gap: 1px; text-align: left; }
  .st-label { font-size: 9px; color: var(--ink3); letter-spacing: 0.12em; text-transform: uppercase; }
  .st-value { font-size: 13px; color: var(--ink); }
  .st-value.placeholder { color: var(--ink3); font-style: italic; font-size: 12px; }
  .st-pip { font-size: 10px; color: var(--green); margin-left: 6px; }

  .st-arrow { font-size: 10px; color: var(--ink3); transition: transform 0.2s; }
  .scene-trigger.open .st-arrow { transform: rotate(180deg); }

  .scene-menu {
    display: none;
    position: absolute; top: 100%; left: 0; right: 0; z-index: 9999;
    background: #ede8dc;
    border: 1px solid var(--card-active-border);
    border-top: none;
    border-bottom-left-radius: 8px;
    border-bottom-right-radius: 8px;
    box-shadow: 0 8px 28px rgba(26,22,16,0.25);
    overflow: hidden;
  }
  .scene-menu.open { display: block; animation: fadeDown 0.15s ease both; }

  .scene-option {
    padding: 11px 18px;
    cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    transition: background 0.12s;
    border-bottom: 1px solid rgba(26,22,16,0.05);
  }
  .scene-option:last-child { border-bottom: none; }
  .scene-option { background: #ede8dc; }
  .scene-option:hover { background: #e4ddd0; }
  .scene-option.active { background: #e6ddca; }
  .scene-option .so-icon { font-size: 16px; }
  .scene-option .so-name { font-size: 12px; color: var(--ink); flex: 1; }
  .scene-option.active .so-name { color: var(--gold); font-weight: 500; }
  .scene-option .so-pip { font-size: 9px; color: var(--green); }

  /* ── Chapter grid ── */
  .chapter-section { animation: fadeUp 0.2s ease both; }

  .chapter-top {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 10px;
  }
  .chapter-count { font-size: 10px; color: var(--ink3); }

  .chapter-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 7px;
  }

  .ch-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 7px;
    padding: 10px 10px 9px;
    cursor: pointer;
    transition: all 0.15s ease;
    min-height: 60px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .ch-card:hover { border-color: rgba(184,134,11,0.35); transform: translateY(-1px); box-shadow: 0 3px 12px rgba(26,22,16,0.07); }
  .ch-card.selected { border-color: var(--card-active-border); background: var(--card-active); box-shadow: 0 2px 10px rgba(184,134,11,0.12); }
  .ch-card.done { background: var(--green-bg); border-color: var(--green-border); }
  .ch-card.done.selected { border-color: var(--green); background: rgba(58,122,58,0.12); }

  .ch-card-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 5px;
  }
  .ch-card-num { font-size: 8.5px; color: var(--ink3); letter-spacing: 0.08em; }
  .ch-card.done .ch-card-num { color: var(--green); }
  .ch-done-tick { font-size: 9px; color: var(--green); opacity: 0; transition: opacity 0.2s; }
  .ch-card.done .ch-done-tick { opacity: 1; }

  .ch-card-title { font-size: 11px; color: var(--ink); line-height: 1.35; }
  .ch-card.done .ch-card-title { color: var(--ink3); }
  .ch-card.selected .ch-card-title { color: var(--gold); font-weight: 500; }
  .ch-card.done.selected .ch-card-title { color: var(--green); }

  /* ── Correction ── */
  .correction-list { display: flex; flex-direction: column; gap: 7px; }
  .correction-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 8px; padding: 12px 16px;
    cursor: pointer; transition: all 0.15s; backdrop-filter: blur(4px);
  }
  .correction-item:hover { border-color: rgba(184,134,11,0.3); background: rgba(255,255,255,0.8); }
  .correction-item.active { border-color: var(--card-active-border); background: var(--card-active); }
  .radio-dot {
    width: 14px; height: 14px; border-radius: 50%;
    border: 1.5px solid var(--ink3); flex-shrink: 0;
    position: relative; transition: border-color 0.15s;
  }
  .correction-item.active .radio-dot { border-color: var(--gold); }
  .radio-dot::after {
    content: ''; position: absolute; inset: 3px;
    border-radius: 50%; background: var(--gold); opacity: 0; transition: opacity 0.15s;
  }
  .correction-item.active .radio-dot::after { opacity: 1; }
  .correction-name { font-size: 12px; color: var(--ink); display: block; margin-bottom: 2px; }
  .correction-desc { font-size: 10px; color: var(--ink3); }

  /* ── Prompt ── */
  .prompt-box {
    background: rgba(255,255,255,0.7); border: 1px solid var(--line);
    border-radius: 8px; padding: 20px;
    font-size: 12px; line-height: 1.9; color: var(--ink2);
    min-height: 80px; backdrop-filter: blur(4px);
    white-space: pre-wrap; word-break: break-all; transition: all 0.25s;
  }
  .prompt-box.ready { color: var(--ink); border-color: rgba(184,134,11,0.2); background: rgba(255,255,255,0.85); }
  .prompt-empty { color: var(--ink3); font-style: italic; }


  .page-num {
    position: fixed; bottom: 32px; right: 40px;
    font-family: 'Libre Baskerville', serif;
    font-size: 11px; font-style: italic; color: var(--ink3); z-index: 2;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 580px) {
    body::after { left: 0; }
    .page { padding: 36px 16px 80px; }
    .header-title { font-size: 26px; }
    .picker-row { grid-template-columns: 1fr; }
    .chapter-grid { grid-template-columns: repeat(4, 1fr); }
  }

  /* ── Settings grid ── */
  .settings-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px 24px;
    align-items: start;
  }

  .setting-group { }

  .setting-group-label {
    font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--ink3); margin-bottom: 8px;
  }

  .toggle-row {
    display: flex; gap: 6px; flex-wrap: wrap;
  }

  .toggle-btn {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 6px;
    padding: 7px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--ink2);
    cursor: pointer; transition: all 0.15s;
    user-select: none;
  }
  .toggle-btn:hover { border-color: rgba(184,134,11,0.35); color: var(--ink); }
  .toggle-btn.active {
    background: var(--card-active);
    border-color: var(--card-active-border);
    color: var(--gold); font-weight: 500;
  }


  /* ── Call cards ── */
  .call-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 16px;
  }

  .call-card {
    display: block;
    text-decoration: none;
    background: #c8d4b0;
    border-radius: 14px;
    padding: 28px 20px;
    transition: all 0.18s ease;
    position: relative;
    overflow: hidden;
  }
  .call-card:first-child { background: #cdd6b4; }
  .call-card:last-child  { background: #bfcc9e; }
  .call-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(100,120,60,0.2); filter: brightness(1.03); }

  .call-card-inner {
    display: flex; align-items: center; gap: 14px;
  }

  .call-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Libre Baskerville', serif;
    font-size: 18px; font-weight: 700;
    flex-shrink: 0;
  }
  .call-avatar.maya  { background: rgba(255,255,255,0.35); color: #4a5a2a; }
  .call-avatar.miles { background: rgba(255,255,255,0.25); color: #4a5a2a; }

  .call-info { flex: 1; }
  .call-name {
    font-family: 'Libre Baskerville', serif;
    font-size: 18px; font-weight: 700;
    color: #3a4a1e; margin-bottom: 3px;
  }
  .call-hint {
    font-size: 10px; color: #5a6e32;
    letter-spacing: 0.03em; line-height: 1.5;
  }

  .call-icon {
    font-size: 22px;
    opacity: 0.7;
  }



  /* ── Step numbers ── */
  .step-num {
    display: inline-flex;
    align-items: center; justify-content: center;
    width: 16px; height: 16px;
    background: var(--gold);
    color: #fff;
    border-radius: 50%;
    font-size: 9px; font-weight: 700;
    margin-right: 7px;
    flex-shrink: 0;
    letter-spacing: 0;
  }

</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-eyebrow">AI Speaking Coach</div>
    <h1 class="header-title">口语练习 <em>Prompt</em> 生成器</h1>
    <p class="header-sub">先选择场景和章节，添加个性化的练习设定，然后拨通 Maya / Miles 的电话，把开场白念出来就可以！祝你们聊得愉快。</p>
  </div>

  <div class="section">
    <div class="section-label"><span class="step-num">1</span>选择场景与章节</div>
    <div class="picker-row">

      <!-- Left: scene dropdown -->
      <div class="scene-dropdown-wrap" id="sceneDropdownWrap">
        <div class="scene-trigger" id="sceneTrigger" onclick="toggleSceneMenu()">
          <div class="st-content">
            <span class="st-icon" id="stIcon">📚</span>
            <div class="st-texts">
              <span class="st-label">场景</span>
              <span class="st-value placeholder" id="stValue">请选择…</span>
            </div>
            <span class="st-pip" id="stPip"></span>
          </div>
          <span class="st-arrow">▼</span>
        </div>
        <div class="scene-menu" id="sceneMenu"></div>
      </div>

      <!-- Right: chapter grid -->
      <div class="chapter-section" id="chapterSection" style="display:none">
        <div class="chapter-grid" id="chapterGrid"></div>
      </div>

    </div>
  </div>


  <div class="section">
    <div class="section-label"><span class="step-num">2</span>练习设置</div>
    <div class="settings-grid">

      <!-- 英语水平 -->
      <div class="setting-group">
        <div class="setting-group-label">英语水平</div>
        <div class="toggle-row" id="levelRow">
          <div class="toggle-btn active" data-val="beginner" onclick="pickToggle('level', this)">初级</div>
          <div class="toggle-btn" data-val="intermediate" onclick="pickToggle('level', this)">中级</div>
          <div class="toggle-btn" data-val="advanced" onclick="pickToggle('level', this)">高级</div>
        </div>
      </div>

      <!-- 对方角色 -->
      <div class="setting-group">
        <div class="setting-group-label">对方风格</div>
        <div class="toggle-row" id="roleRow">
          <div class="toggle-btn active" data-val="cooperative" onclick="pickToggle('role', this)">配合型</div>
          <div class="toggle-btn" data-val="challenging" onclick="pickToggle('role', this)">挑战型</div>
        </div>
      </div>

      <!-- 纠错时机 -->
      <div class="setting-group">
        <div class="setting-group-label">纠错时机</div>
        <div class="toggle-row" id="correctionRow">
          <div class="toggle-btn active" data-val="realtime" onclick="pickToggle('correction', this)">实时纠正</div>
          <div class="toggle-btn" data-val="after" onclick="pickToggle('correction', this)">结束后</div>
          <div class="toggle-btn" data-val="never" onclick="pickToggle('correction', this)">不纠正</div>
        </div>
      </div>

    </div>
  </div>


  <div class="section">
    <div class="section-label"><span class="step-num">3</span>生成开场白，给 Maya / Miles 打电话</div>
    <div class="prompt-box" id="promptBox">
      <span class="prompt-empty">请先完成步骤一和步骤二…</span>
    </div>
    <!-- Call cards -->
    <div class="call-cards" id="callCards">
      <a class="call-card" href="https://app.sesame.com/" target="_blank" onclick="goSesame()">
        <div class="call-card-inner">
          <div class="call-avatar maya">M</div>
          <div class="call-info">
            <div class="call-name">Maya</div>
            <div class="call-hint">念出 Prompt，她会进入角色</div>
          </div>
          <div class="call-icon">📞</div>
        </div>
      </a>
      <a class="call-card" href="https://app.sesame.com/" target="_blank" onclick="goSesame()">
        <div class="call-card-inner">
          <div class="call-avatar miles">M</div>
          <div class="call-info">
            <div class="call-name">Miles</div>
            <div class="call-hint">念出 Prompt，他会进入角色</div>
          </div>
          <div class="call-icon">📞</div>
        </div>
      </a>
    </div>
  </div>

</div>
<div class="page-num">p. 1</div>

<script>

let curScene      = null;
let curChapter    = null;
let curCorrection = 'realtime';
let curLevel      = 'beginner';
let curRole       = 'cooperative';
let menuOpen      = false;
const doneMap     = {};
SCENES.forEach(s => { doneMap[s.id] = new Set(); });

// ── Build scene menu ──────────────────────────────────────────────────
function buildSceneMenu() {
  const menu = document.getElementById('sceneMenu');
  SCENES.forEach(s => {
    const opt = document.createElement('div');
    opt.className = 'scene-option';
    opt.id = 'sopt-' + s.id;
    opt.innerHTML = `
      <span class="so-icon">${s.icon}</span>
      <span class="so-name">${s.name}</span>
      <span class="so-pip" id="sopip-${s.id}"></span>`;
    opt.onclick = () => selectScene(s.id);
    menu.appendChild(opt);
  });
}

// ── Scene dropdown toggle ─────────────────────────────────────────────
function toggleSceneMenu() {
  menuOpen ? closeMenu() : openMenu();
}
function openMenu() {
  menuOpen = true;
  document.getElementById('sceneTrigger').classList.add('open');
  document.getElementById('sceneMenu').classList.add('open');
}
function closeMenu() {
  menuOpen = false;
  document.getElementById('sceneTrigger').classList.remove('open');
  document.getElementById('sceneMenu').classList.remove('open');
}

// ── Select scene ──────────────────────────────────────────────────────
function selectScene(id) {
  closeMenu();
  if (curScene) document.getElementById('sopt-' + curScene).classList.remove('active');
  curScene = id;
  curChapter = null;
  document.getElementById('sopt-' + id).classList.add('active');

  const scene = SCENES.find(s => s.id === id);

  // update trigger
  document.getElementById('stIcon').textContent = scene.icon;
  const stVal = document.getElementById('stValue');
  stVal.textContent = scene.name;
  stVal.classList.remove('placeholder');

  buildChapterGrid(id);
  refreshProgress(id);
  refreshPrompt();
}

// ── Chapter grid ──────────────────────────────────────────────────────
function buildChapterGrid(id) {
  const scene = SCENES.find(s => s.id === id);
  const grid  = document.getElementById('chapterGrid');
  grid.innerHTML = '';

  scene.chapters.forEach((ch, idx) => {
    const isDone = doneMap[id].has(idx);
    const isSel  = curChapter === idx;
    const card   = document.createElement('div');
    card.className = 'ch-card' + (isDone ? ' done' : '') + (isSel ? ' selected' : '');
    card.innerHTML = `
      <div class="ch-card-top">
        <span class="ch-card-num">Ch.${String(idx+1).padStart(2,'0')}</span>
        <span class="ch-done-tick">✓</span>
      </div>
      <div class="ch-card-title">${ch.t}</div>`;
    card.onclick = () => { curChapter = idx; buildChapterGrid(id); refreshPrompt(); };
    grid.appendChild(card);
  });

  document.getElementById('chapterSection').style.display = 'block';
}

// ── Progress ──────────────────────────────────────────────────────────
function refreshProgress(id) {
  const n = doneMap[id].size;

  // pip in dropdown option
  const pip = document.getElementById('sopip-' + id);
  pip.textContent = n > 0 ? `${n}/12` : '';

  // pip in trigger (if current scene)
  if (curScene === id) {
    document.getElementById('stPip').textContent = n > 0 ? `${n}/12` : '';
  }
}

// ── Settings toggles ─────────────────────────────────────────────────
function pickToggle(group, el) {
  const rowId = { level: 'levelRow', role: 'roleRow', correction: 'correctionRow', feedbackLang: 'feedbackLangRow' }[group];
  document.querySelectorAll('#' + rowId + ' .toggle-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const val = el.dataset.val;
  if (group === 'level')       curLevel = val;
  if (group === 'role')        curRole = val;
  if (group === 'correction')  curCorrection = val;
  refreshPrompt();
}

// ── Prompt ────────────────────────────────────────────────────────────
function refreshPrompt() {
  const box = document.getElementById('promptBox');
  if (!curScene || curChapter === null) {
    box.innerHTML = '<span class="prompt-empty">请先选择场景和章节…</span>';
    box.classList.remove('ready'); return;
  }
  const ch = SCENES.find(s => s.id === curScene).chapters[curChapter];

  const level = { beginner: 'beginner', intermediate: 'intermediate', advanced: 'advanced' }[curLevel];
  const role  = curRole === 'challenging' ? 'Push back occasionally.' : '';
  const corr  = { realtime: 'Correct my English after each turn.', after: 'Give corrections at the end.', never: '' }[curCorrection];

  const levelLine = { beginner: "My English is beginner level.", intermediate: "My English is intermediate.", advanced: "My English is advanced." }[curLevel];
  const parts = [
    `Hi, I'm [Your Name]. Can we do a quick roleplay to practice my English? ${ch.d} ${levelLine}`,
    role, corr, "Let's start!",
  ].filter(Boolean);

  box.textContent = parts.join(' ');
  box.classList.add('ready');
}



// close on outside click
document.addEventListener('click', e => {
  if (menuOpen && !document.getElementById('sceneDropdownWrap').contains(e.target)) closeMenu();
});

// ── Go Sesame: copy prompt + mark done ───────────────────────────────
function goSesame() {
  if (!curScene || curChapter === null) return;
  const text = document.getElementById('promptBox').textContent;
  if (text && !text.includes('请先')) navigator.clipboard.writeText(text).catch(() => {});
  if (curScene && curChapter !== null) {
    doneMap[curScene].add(curChapter);
    buildChapterGrid(curScene);
    refreshProgress(curScene);
  }
}

buildSceneMenu();

// default: show 日常闲聊
selectScene('smalltalk');
